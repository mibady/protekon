# Lint, typecheck, test, build on every PR.
# Vitest tests mock Supabase/Inngest — no secrets required for lint/typecheck/test.
# Build needs the two NEXT_PUBLIC_SUPABASE_* secrets (already set for meticulous.yaml).

name: CI

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      # 55 Vitest tests are broken on `main` (pre-existing mock drift in
      # chat / stripe / action tests). Test step runs and reports status
      # but does not block merge. Remove continue-on-error once the suite
      # is back to green in a dedicated test-fix PR.
      - name: Test
        run: npm run test
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
