# Lint, typecheck, test, build on every PR.
# Vitest tests mock Supabase/Inngest — no secrets required for lint/typecheck/test.
# Build needs the two NEXT_PUBLIC_SUPABASE_* secrets (already set for meticulous.yaml).

name: CI

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      # Suite is now green (362/362). A red test blocks merge — that is the
      # whole point. If you find yourself wanting to add continue-on-error
      # back, fix the test instead.
      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
